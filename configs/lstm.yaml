#Hierarchical LSTM parameters

model: hierarchical_lstm

# architecture
embed_size: 512          # word embedding size AND visual projection size
hidden_size: 512         # LSTM hidden units (both sentence and word LSTM)
word_num_layers: 2       # layers in word LSTM (2 per Jing et al.)
dropout: 0.1             # applied after each LSTM step
s_max: 6                 # max sentences per report (IU X-Ray reports avg ~5)
n_max: 30                # max tokens per sentence (including BOS + EOS)
pretrained_encoder: true # use ImageNet DenseNet-121 weights
reshape_captions: true   # flat (B, seq_len) input from R2Gen loader


# vocab tokens (must match tokenizer built in data pipeline) 
# confirm bos_id / eos_id / pad_id 
bos_id: 1 
eos_id: 2
pad_id: 0

#training
batch_size: 16
epochs: 30
learning_rate: 1.0e-4    # AdamW lr for decoder
lr_encoder: 5.0e-5       # lower lr for pretrained DenseNet encoder (freeze first few epochs)
weight_decay: 5.0e-5
grad_clip: 5.0           # gradient clipping max norm — important for LSTM stability
freeze_encoder_epochs: 5 # freeze CNN for first N epochs, then unfreeze
num_workers: 4
max_seq_length: 60       # R2Gen default — flat sequence length before reshape


# Scheduler
scheduler: cosine        # cosine annealing
warmup_epochs: 2

# Early stopping
monitor_metric: BLEU_4
monitor_mode: max
patience: 10             # stop if no improvement for 10 epochs
